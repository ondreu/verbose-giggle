name: CI & Release

on:
  push:
    branches: [main]
  pull_request:

# Allow pushing to GHCR with the built-in token.
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # CI — install, build, test the pnpm workspace (runs on PRs and pushes).
  # ---------------------------------------------------------------------------
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

  # ---------------------------------------------------------------------------
  # Release — build & push the Docker image to GHCR (spec §14.5).
  # Only on push to main; Watchtower picks up :latest on the NAS (§14.4).
  # ---------------------------------------------------------------------------
  release:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image owner `ondreu` per the spec; confirm against the real GitHub
      # account/org. Image name is lowercased per GHCR requirements.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/ondreu/ai-dungeon-master:latest
            ghcr.io/ondreu/ai-dungeon-master:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Release piper-http — thin HTTP adapter for Czech TTS (spec §11, §18.1).
  # Published as a ready-to-pull image so NAS deployments need no local build.
  # ---------------------------------------------------------------------------
  release-piper:
    name: Build & push piper-http image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/piper-http
          file: services/piper-http/Dockerfile
          push: true
          tags: |
            ghcr.io/ondreu/piper-http:latest
            ghcr.io/ondreu/piper-http:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
