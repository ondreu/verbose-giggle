# AI Dungeon Master — NAS deployment (spec §14.2)
#
# Copy this file (and Caddyfile) to your NAS, create a `.env` next to it with
# at least LLM_API_KEY set (see /.env.example), then `docker compose up -d`.
#
# Watchtower auto-pulls the :latest image pushed by CI (spec §14.4); only
# containers labeled watchtower.enable=true are updated.

services:
  app:
    # Pull the CI-built image (spec §14.1/§14.5). The GHCR owner `ondreu`
    # should be confirmed against the real GitHub account/org.
    image: ghcr.io/ondreu/ai-dungeon-master:latest
    # For local builds instead of pulling, comment out `image:` above and
    # uncomment this block (build context is the repo root):
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - LLM_API_KEY=${LLM_API_KEY}                                  # required
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.mistral.ai/v1}     # Mistral or OpenRouter base URL
      - LLM_MODEL=${LLM_MODEL:-mistral-medium-3.5}
      - VAULT_PATH=/data/vault
      - PIPER_URL=http://piper:5000                                 # see piper note below
      - BASIC_AUTH=${BASIC_AUTH:-}                                  # optional "user:pass" gate
    volumes:
      - ./vault:/data/vault                # campaigns (markdown + frontmatter + JSON)
      - ./maps:/data/maps                  # map images
      - ./srd:/data/srd                    # SRD JSON (or rely on the copy bundled in the image)
      # Live session state is written inside each campaign's state/ folder
      # under ./vault, so it persists with the mounted vault automatically.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - piper
    # Not published to the host; reached via Caddy on the internal network.
    expose:
      - "3000"

  piper:
    # Thin HTTP adapter (services/piper-http) implementing the plain-HTTP
    # contract the server expects: POST /tts {text} -> audio/wav (spec §11).
    # It wraps the `piper` CLI; mount a cs_CZ voice at ./piper-voices and set
    # PIPER_VOICE. Without a voice it returns silence, so TTS is always wired.
    build:
      context: ../services/piper-http
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PIPER_VOICE=/voices/cs_CZ-jirka-medium.onnx   # mount the matching .onnx + .onnx.json
    volumes:
      - ./piper-voices:/voices
    # Internal only — never published to the host.
    expose:
      - "5000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  cloudflared:
    # Cloudflare Tunnel — public HTTPS without open ports (spec §14.3).
    # Create a tunnel at https://one.dash.cloudflare.com → Networks → Tunnels,
    # copy the token, set CLOUDFLARE_TUNNEL_TOKEN in .env, and route the tunnel
    # to http://app:3000 in the Zero Trust dashboard.
    # Start with: docker compose --profile cloudflare up -d
    # When using this you can remove the caddy service (no ports 80/443 needed),
    # or keep Caddy running for local LAN access alongside the tunnel.
    profiles: [cloudflare]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --label-enable    # only update labeled containers

volumes:
  caddy_data:
  caddy_config:
