# AI Dungeon Master — NAS deployment (spec §14.2)
#
# Copy this file (and Caddyfile if you use it) to your NAS, create a `.env`
# next to it (see /.env.example), then start with the ingress you want:
#
#   docker compose up -d                              # app only (LAN / Tailscale)
#   docker compose --profile caddy up -d              # + Caddy public HTTPS
#   docker compose --profile cloudflare up -d         # + Cloudflare Tunnel
#
# Watchtower auto-pulls the :latest image pushed by CI (spec §14.4); only
# containers labeled watchtower.enable=true are updated.

services:
  app:
    # Pull the CI-built image (spec §14.1/§14.5). The GHCR owner `ondreu`
    # should be confirmed against the real GitHub account/org.
    image: ghcr.io/ondreu/ai-dungeon-master:latest
    # For local builds instead of pulling, comment out `image:` above and
    # uncomment this block (build context is the repo root):
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - LLM_API_KEY=${LLM_API_KEY}                                  # required
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.mistral.ai/v1}     # Mistral or OpenRouter base URL
      - LLM_MODEL=${LLM_MODEL:-mistral-medium-3.5}
      - VAULT_PATH=/data/vault
      # TTS: Azure AI Speech is the expressive primary; Piper is the fallback.
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY:-}                       # set to enable Azure TTS
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-}                 # e.g. westeurope
      - AZURE_TTS_VOICE=${AZURE_TTS_VOICE:-cs-CZ-AntoninNeural}
      - AZURE_TTS_RATE=${AZURE_TTS_RATE:--6%}
      - AZURE_TTS_PITCH=${AZURE_TTS_PITCH:--2%}
      - PIPER_URL=http://piper:5000                                 # fallback; see piper note below
      - BASIC_AUTH=${BASIC_AUTH:-}                                  # optional "user:pass" gate
    volumes:
      # Named volume — persists across `docker compose down` and Watchtower
      # image updates. Use `docker volume inspect <project>_vault_data` to find
      # the on-disk path. To access files directly, swap for: ./vault:/data/vault
      - vault_data:/data/vault
      - ./maps:/data/maps                  # map images
      - ./srd:/data/srd                    # SRD JSON (or rely on the copy bundled in the image)
      # Live session state is written inside each campaign's state/ folder
      # under vault_data, so it persists with the vault automatically.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - piper
    # Not published to the host; reached via Caddy on the internal network.
    expose:
      - "3000"

  piper:
    # Thin HTTP adapter (services/piper-http) implementing the plain-HTTP
    # contract the server expects: POST /tts {text} -> audio/wav (spec §11).
    # It wraps the `piper` CLI; mount a cs_CZ voice at ./piper-voices and set
    # PIPER_VOICE. Without a voice it returns silence, so TTS is always wired.
    build:
      context: ../services/piper-http
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PIPER_VOICE=/voices/cs_CZ-jirka-medium.onnx   # mount the matching .onnx + .onnx.json
    volumes:
      - ./piper-voices:/voices
    # Internal only — never published to the host.
    expose:
      - "5000"

  # --- Ingress option A: Caddy public HTTPS (profile: caddy) ----------------
  caddy:
    image: caddy:2
    profiles: ["caddy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # --- Ingress option B: Cloudflare Tunnel (profile: cloudflare) -------------
  # No open ports / no port-forwarding: cloudflared dials OUT to Cloudflare,
  # which terminates TLS and proxies to the app. So you don't need Caddy here.
  # In the Cloudflare Zero Trust dashboard, create a tunnel, copy its token to
  # CLOUDFLARE_TUNNEL_TOKEN in .env, and add a Public hostname routing your
  # domain to the service http://app:3000. SSE (/api/events) works through the
  # tunnel — the server sends keep-alive pings every 25s. The app has no
  # built-in auth, so protect it with Cloudflare Access (recommended) or
  # BASIC_AUTH.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --label-enable    # only update labeled containers

volumes:
  vault_data:   # Docker-managed vault; survives image updates and container recreation
  caddy_data:
  caddy_config:
