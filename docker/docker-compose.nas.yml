# AI Dungeon Master — Ugreen NAS / Docker GUI deployment
#
# Tato varianta docker-compose souboru je určena pro NAS s Docker GUI
# (Ugreen, Synology, QNAP apod.) kde nelze snadno předávat --profile přepínač.
#
# Co tento soubor dělá jinak než docker-compose.yml:
#   - cloudflared je standardní service (žádný profil) — vždy se spustí
#   - Caddy je vynechán — veřejný přístup zajišťuje Cloudflare Tunnel
#   - piper používá předem sestavenou image z GHCR (žádný lokální build)
#   - vault_data je pojmenovaný Docker volume (ne bind mount) — data přežijí
#     jakoukoliv aktualizaci image přes Watchtower nebo Docker GUI bez ztráty
#     kampaní
#
# Před spuštěním:
#   1. Nastav CLOUDFLARE_TUNNEL_TOKEN (viz níže).
#   2. Stáhni hlasový model pro Piper (cs_CZ-jirka-medium.onnx + .onnx.json)
#      a ulož ho do ./piper-voices/ (viz README).
#   3. (Volitelné) Nastav LLM_API_KEY pro živý LLM; bez klíče běží offline mock.
#   Při prvním spuštění se vault automaticky zaséje příkladovou kampaní.
#
# Přístup k souborům kampání (pro ruční editaci):
#   docker run --rm -v vault_data:/vault -v $(pwd):/backup alpine \
#     tar czf /backup/vault-backup.tar.gz -C /vault .
#
# MIGRACE ze starého bind mount ./vault:
#   1. Přidej dočasně do volumes sekce app: `- ./vault:/data/vault-legacy`
#   2. Přidej env: `- VAULT_LEGACY_PATH=/data/vault-legacy`
#   3. Spusť `docker compose -f docker-compose.nas.yml up -d` — entrypoint
#      automaticky zkopíruje ./vault → vault_data.
#   4. Odebeř oba dočasné řádky a restartuj.

services:
  app:
    image: ghcr.io/ondreu/ai-dungeon-master:latest
    restart: unless-stopped
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.mistral.ai/v1}
      - LLM_MODEL=${LLM_MODEL:-mistral-medium-3.5}
      - VAULT_PATH=/data/vault
      # TTS: Azure AI Speech primary (expressive CZ), Piper fallback.
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY:-}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-}
      - AZURE_TTS_VOICE=${AZURE_TTS_VOICE:-cs-CZ-AntoninNeural}
      - AZURE_TTS_RATE=${AZURE_TTS_RATE:--6%}
      - AZURE_TTS_PITCH=${AZURE_TTS_PITCH:--2%}
      - PIPER_URL=http://piper:5000
      - BASIC_AUTH=${BASIC_AUTH:-}
    volumes:
      # Named volume — Docker Engine spravuje storage; data přežijí aktualizaci
      # image přes Watchtower i `docker compose down`. DOPORUČENO pro NAS.
      - vault_data:/data/vault
      # Alternativa pro přímý přístup k souborům na hostiteli (bind mount):
      # Přejmenuj/zakomentuj řádek výše a odkomentuj níže. Data z předchozího
      # named volume se automaticky NEzkopírují — nutná ruční migrace.
      # - ./vault:/data/vault
      - ./maps:/data/maps
      - ./srd:/data/srd
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - piper
    expose:
      - "3000"

  piper:
    # Předem sestavená image publikovaná CI — žádný lokální build není potřeba.
    image: ghcr.io/ondreu/piper-http:latest
    restart: unless-stopped
    environment:
      - PIPER_VOICE=/voices/cs_CZ-jirka-medium.onnx
    volumes:
      - ./piper-voices:/voices
    expose:
      - "5000"

  cloudflared:
    # Cloudflare Tunnel — HTTPS bez otevřených portů 80/443 na NAS.
    # Token získáš v Zero Trust dashboardu (viz README — sekce Cloudflare Tunnel).
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --label-enable

volumes:
  # Docker-managed persistent storage for the vault (campaigns, settings, state).
  # Survives: `docker compose down`, image updates via Watchtower, container
  # recreation. Never deleted by `docker compose down` (only by `down -v`).
  vault_data:
